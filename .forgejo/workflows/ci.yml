# Pipeline Librenard — Forgejo Actions (remplace l'ancien .gitlab-ci.yml).
# Token BookStack : js/wiki/api.js (surcharge possible via le secret BOOKSTACK_TOKEN).
# Étapes : renifler (tests, audit) -> tisser (build) -> patrouille (vérifications).

name: Pipeline Librenard

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # --- Renifler : tests et sécurité des dépendances ---

  reniflage-tests-unitaires:
    name: Reniflage — tests unitaires
    runs-on: docker
    container:
      image: node:22-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: ./.forgejo/actions/node-setup
      - name: Tests unitaires
        run: npm test

  vigilance-audit-npm:
    name: Vigilance — audit npm
    runs-on: docker
    container:
      image: node:22-bookworm
    continue-on-error: true
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: ./.forgejo/actions/node-setup
      - name: Audit des dépendances
        run: npm audit --audit-level=high

  # --- Tisser : génération du site ---

  tissage-build-site:
    name: Tissage — build du site
    runs-on: docker
    container:
      image: node:22-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: ./.forgejo/actions/node-setup
      - name: Build du site
        env:
          BOOKSTACK_TOKEN: ${{ secrets.BOOKSTACK_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "main" ]; then
            echo "Build complet avec prérendu wiki (token dans js/wiki/api.js)."
            npm run build
          else
            echo "Build hors ligne (--no-wiki) : pas d'appel API sur les branches/PR."
            npm run build -- --no-wiki
          fi
      - name: Publication des artefacts
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: site
          retention-days: 14
          include-hidden-files: false
          if-no-files-found: error
          path: |
            index.html
            projets.html
            wiki.html
            outils.html
            contact.html
            a-propos.html
            error/
            wiki/
            css/
            js/
            images/
            vendor/
            pagefind/
            sitemap.xml
            robots.txt
            site.webmanifest

  # --- Patrouille : vérifications post-build ---

  recherche-pagefind:
    name: Patrouille — recherche Pagefind
    runs-on: docker
    container:
      image: node:22-bookworm
    needs: tissage-build-site
    steps:
      - name: Récupération des artefacts
        uses: https://code.forgejo.org/forgejo/download-artifact@v4
        with:
          name: site
      - name: Vérification de l'index Pagefind
        run: |
          if [ ! -f pagefind/pagefind.js ]; then
            if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "main" ]; then
              echo "Index Pagefind manquant sur main : la recherche wiki offline est cassée."
              exit 1
            fi
            echo "Pas d'index Pagefind (build --no-wiki) : normal sur cette branche."
            exit 0
          fi
          echo "Index Pagefind présent : recherche offline OK."

  cartographie-sitemap:
    name: Patrouille — cartographie sitemap
    runs-on: docker
    container:
      image: node:22-bookworm
    needs: tissage-build-site
    continue-on-error: true
    steps:
      - name: Récupération des artefacts
        uses: https://code.forgejo.org/forgejo/download-artifact@v4
        with:
          name: site
      - name: Vérification du sitemap
        run: |
          test -f sitemap.xml
          URL_COUNT=$(grep -c '<url>' sitemap.xml)
          WIKI_COUNT=$(grep -c '<loc>https://librenard.fr/site/wiki/' sitemap.xml || true)
          echo "Sitemap : ${URL_COUNT} URLs au total, dont ${WIKI_COUNT} pages wiki."
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "main" ] && [ "$WIKI_COUNT" -lt 50 ]; then
            echo "Alerte : le sitemap main contient peu de pages wiki (${WIKI_COUNT})."
            exit 1
          fi

  pistes-internes-liens:
    name: Patrouille — liens internes
    runs-on: docker
    container:
      image: node:22-bookworm
    needs: tissage-build-site
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: ./.forgejo/actions/node-setup
      - name: Récupération des artefacts (écrase les sources par le build)
        uses: https://code.forgejo.org/forgejo/download-artifact@v4
        with:
          name: site
      - name: Vérification des liens internes
        run: npm run check:links
