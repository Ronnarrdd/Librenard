# Pipeline Librenard — runner Docker debian:latest
# Token BookStack : js/wiki/api.js (surcharge possible via BOOKSTACK_TOKEN en CI).
# Noms des jobs = libellés affichés dans GitLab (pas de clé "name", non supportée ici).

stages:
  - renifler
  - tisser
  - patrouille

default:
  image: debian:latest
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/

variables:
  NODE_MAJOR: "22"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  DEBIAN_FRONTEND: noninteractive

.node-setup:
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends ca-certificates curl gnupg
    - mkdir -p /etc/apt/keyrings
    - curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
    - echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_${NODE_MAJOR}.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends nodejs
    - node --version
    - npm --version
    - npm ci

# --- Renifler : tests et sécurité des dépendances ---

reniflage-tests-unitaires:
  stage: renifler
  extends: .node-setup
  script:
    - npm test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

vigilance-audit-npm:
  stage: renifler
  extends: .node-setup
  script:
    - npm audit --audit-level=high
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# --- Tisser : génération du site ---

tissage-build-site:
  stage: tisser
  extends: .node-setup
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        echo "Build complet avec prérendu wiki (token dans js/wiki/api.js)."
        npm run build
      else
        echo "Build hors ligne (--no-wiki) : pas d'appel API sur les branches/MR."
        npm run build -- --no-wiki
      fi
  artifacts:
    expire_in: 2 weeks
    paths:
      - index.html
      - projets.html
      - wiki.html
      - outils.html
      - contact.html
      - a-propos.html
      - error/
      - wiki/
      - css/
      - js/
      - images/
      - vendor/
      - pagefind/
      - sitemap.xml
      - robots.txt
      - site.webmanifest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# --- Patrouille : vérifications post-build ---

recherche-pagefind:
  stage: patrouille
  needs:
    - job: tissage-build-site
      artifacts: true
  script:
    - |
      if [ ! -f pagefind/pagefind.js ]; then
        if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
          echo "Index Pagefind manquant sur main : la recherche wiki offline est cassée."
          exit 1
        fi
        echo "Pas d'index Pagefind (build --no-wiki) : normal sur cette branche."
        exit 0
      fi
      echo "Index Pagefind présent : recherche offline OK."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

cartographie-sitemap:
  stage: patrouille
  needs:
    - job: tissage-build-site
      artifacts: true
  script:
    - test -f sitemap.xml
    - |
      URL_COUNT=$(grep -c '<url>' sitemap.xml)
      WIKI_COUNT=$(grep -c '<loc>https://librenard.fr/site/wiki/' sitemap.xml || true)
      echo "Sitemap : ${URL_COUNT} URLs au total, dont ${WIKI_COUNT} pages wiki."
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] && [ "$WIKI_COUNT" -lt 50 ]; then
        echo "Alerte : le sitemap main contient peu de pages wiki (${WIKI_COUNT})."
        exit 1
      fi
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

pistes-internes-liens:
  stage: patrouille
  extends: .node-setup
  needs:
    - job: tissage-build-site
      artifacts: true
  script:
    - npm run check:links
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

exploration-liens-externes:
  stage: patrouille
  extends: .node-setup
  needs:
    - job: tissage-build-site
      artifacts: true
  script:
    - npm run check:links:external
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

planifie-exploration-liens:
  stage: patrouille
  extends: .node-setup
  needs:
    - job: tissage-build-site
      artifacts: true
  script:
    - npm run check:links:external
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
